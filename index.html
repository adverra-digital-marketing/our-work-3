<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adverra | Digital Growth for Indian Businesses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.321.0"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background:#020202; color:#fff; }
        .glass { background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); }
        .glass-card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); }
        .img-overlay { background:linear-gradient(to top,rgba(0,0,0,1),rgba(0,0,0,0.4),transparent); }
    </style>
</head>

<body>

<!-- HEADER -->
<header class="fixed top-0 left-0 right-0 glass px-6 py-4 flex justify-between items-center z-50">

    <!-- LOGO FIX -->
    <div class="flex items-center gap-3">
        <img src="assets/logo.png" 
             onerror="this.src='https://via.placeholder.com/80x80?text=ADVERRA'"
             class="w-10 h-10 rounded-xl object-cover" />
        <span class="text-xl font-black">ADVERRA</span>
    </div>

    <nav class="hidden md:flex gap-8 text-gray-400 font-bold text-sm">
        <a href="#services">Services</a>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
    </nav>

    <a class="bg-white text-black px-5 py-2 rounded-full font-bold text-sm">Start</a>
</header>


<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-32">
    <h1 class="text-5xl md:text-7xl font-black">DOMINATE INDIAN MARKET</h1>
    <p class="text-gray-400 mt-6 max-w-xl">
        AI driven marketing for Indian businesses
    </p>
</section>


<!-- SERVICES -->
<section class="px-6 py-20">
    <h2 class="text-4xl font-black text-center mb-12">Our Services</h2>

    <div class="grid md:grid-cols-3 gap-6">

        <div class="glass-card p-8 rounded-3xl">
            Social Media Growth for India
        </div>

        <div class="glass-card p-8 rounded-3xl">
            Meta + Google Ads India Focus
        </div>

        <div class="glass-card p-8 rounded-3xl">
            Indian Brand Video Production
        </div>

    </div>
</section>


<!-- WORK -->
<section id="work" class="px-6 py-20">
    <h2 class="text-4xl font-black text-center mb-12">Indian Client Work</h2>

    <div id="grid" class="grid md:grid-cols-4 gap-6"></div>
</section>


<!-- FOOTER -->
<footer class="text-center py-10 border-t border-white/10">

    <img src="assets/logo.png"
         onerror="this.src='https://via.placeholder.com/80x80?text=ADVERRA'"
         class="w-12 mx-auto mb-4 rounded-xl">

    <p class="text-gray-500">© 2026 Adverra India</p>
</footer>


<script>
const projects = [
    { name:"Fashion India", img:"fashion" },
    { name:"Jewellery India", img:"gold,jewelry,india" },
    { name:"Real Estate India", img:"india,building,luxury" },
    { name:"Restaurant India", img:"india,food,restaurant" },
    { name:"Startup India", img:"india,office,startup" },
    { name:"Education India", img:"india,students,school" },
    { name:"Gym India", img:"india,gym,fitness" },
    { name:"Hospital India", img:"india,hospital,medical" }
];

const grid = document.getElementById("grid");

projects.forEach(p=>{
    grid.innerHTML += `
    <div class="glass-card rounded-3xl overflow-hidden">
        <img src="https://source.unsplash.com/600x800/?${p.img}"
             class="w-full h-64 object-cover">
        <div class="p-4 font-bold">${p.name}</div>
    </div>`;
});
</script>

</body>
</html>
